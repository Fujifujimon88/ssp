<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン – SSP Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e2e8f0; --muted: #94a3b8; --accent: #6366f1;
      --green: #22c55e; --red: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 40px; width: 100%; max-width: 400px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo h1 { font-size: 20px; font-weight: 700; }
    .badge { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 99px; font-size: 11px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    .field { margin-bottom: 18px; }
    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s; margin-top: 8px;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .error {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: var(--red); margin-top: 16px; display: none;
    }
    .hint {
      font-size: 12px; color: var(--muted); margin-top: 20px;
      text-align: center; line-height: 1.7;
    }
    .hint a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>SSP Platform</h1>
    <span class="badge">v0.2</span>
  </div>
  <p class="subtitle">パブリッシャーポータルにログイン</p>

  <form id="login-form">
    <div class="field">
      <label for="domain">ドメイン</label>
      <input id="domain" type="text" placeholder="example.com" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">パスワード</label>
      <input id="password" type="password" placeholder="パスワードを入力" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="submit-btn">ログイン</button>
    <div class="error" id="error-msg"></div>
  </form>

  <p class="hint">
    アカウントをお持ちでない場合は<br>
    <a href="/dashboard#register">管理者に登録依頼</a>するか
    <a href="/admin">管理画面</a>から登録してください。
  </p>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');
  const domain = document.getElementById('domain').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  errEl.style.display = 'none';

  try {
    const res = await fetch('/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ username: domain, password }),
    });

    if (!res.ok) {
      const d = await res.json();
      throw new Error(d.detail || '認証に失敗しました');
    }

    const { access_token } = await res.json();
    localStorage.setItem('ssp_token', access_token);
    window.location.href = '/dashboard';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
});

// 既にログイン済みならダッシュボードへ
if (localStorage.getItem('ssp_token')) {
  window.location.href = '/dashboard';
}
</script>
</body>
</html>
